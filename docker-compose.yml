services:
  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    environment:
      - MUNKI_DOMAIN=${MUNKI_DOMAIN}
      - MANAGE_DOMAIN=${MANAGE_DOMAIN}
      - ACME_EMAIL=${ACME_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./certs/ca.crt:/etc/caddy/ca.crt:ro
      - caddy_data:/data
      - caddy_config:/config
      - ${MUNKI_REPO_PATH}:/srv/munki/repo:ro

  webdav:
    image: httpd:alpine
    restart: unless-stopped
    volumes:
      - ./conf/httpd-webdav.conf:/usr/local/apache2/conf/httpd.conf:ro
      - ${MUNKI_REPO_PATH}:/usr/local/apache2/htdocs:rw

  ddns:
    image: favonia/cloudflare-ddns:latest
    restart: unless-stopped
    read_only: true
    security_opt:
      - no-new-privileges:true
    environment:
      - CF_API_TOKEN=${CF_API_TOKEN}
      - DOMAINS=${MUNKI_DOMAIN},${MANAGE_DOMAIN}
      - PROXIED=false
      - IP6_PROVIDER=none

volumes:
  caddy_data:
  caddy_config:
